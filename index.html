<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>機械工程工具箱 | ME Engineering Toolbox</title>
  <meta name="description" content="機械工程 Web 工具入口：馬達選型、幾何公差查表、潤滑系統計算、資料比對等工程輔助工具。">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="./">
        <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/>
          <path d="M12 2.8v2.4M12 18.8v2.4M2.8 12h2.4M18.8 12h2.4M5.5 5.5l1.7 1.7M16.8 16.8l1.7 1.7M18.5 5.5l-1.7 1.7M7.2 16.8l-1.7 1.7"/>
        </svg>
        <span class="brand-text">
          <span class="brand-title">機械工程工具箱</span>
          <span class="brand-subtitle">ME Engineering Toolbox</span>
        </span>
      </a>
      <button id="sidebar-toggle" type="button" class="sidebar-toggle-btn" hidden aria-label="開啟側邊欄" title="開啟側邊欄">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <div class="header-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/>
          </svg>
          <input id="search-input" type="search" placeholder="搜尋工具…" aria-label="搜尋工具" autocomplete="off">
        </div>
        <button id="theme-toggle" type="button" aria-label="切換深淺主題" title="切換深淺主題">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
          </svg>
        </button>
        <button id="feedback-btn" type="button" aria-label="意見回饋" title="意見回饋">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <p class="tagline">為機械設計與現場工程整理的線上工具，點選卡片開啟使用。</p>
    <div id="tool-sections"></div>
    <p id="no-results" class="no-results" hidden>找不到符合「<span id="no-results-term"></span>」的工具。</p>
  </main>

  <div id="tool-view" class="tool-view" hidden>
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <button id="sidebar-back" type="button" class="sidebar-back-btn" title="回首頁">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="16" height="16">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          回首頁
        </button>
        <button id="sidebar-collapse" type="button" class="sidebar-collapse-btn" aria-label="收合側邊欄" title="收合側邊欄">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
    </aside>
    <div class="tool-iframe-wrap">
      <iframe id="tool-iframe" class="tool-iframe" title="工具內容"></iframe>
    </div>
  </div>

  <div id="feedback-modal" class="modal-overlay" hidden>
    <div class="modal-content feedback-modal-content">
      <button id="feedback-close" type="button" class="modal-close-btn" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <iframe class="feedback-iframe" src="about:blank" title="意見回饋表單"></iframe>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <h2>關於本站</h2>
      <p>本站為個人開發的機械工程 Web 工具入口，各工具皆可免費使用、資料只存放在您的瀏覽器中。</p>
      <p class="disclaimer">⚠ 資料正確性聲明：各工具之計算結果與查表數值僅供工程參考，實際設計請以原廠型錄、相關標準（CNS／ISO）與專業工程師之判斷為準，本站不對使用結果承擔任何責任。</p>
      <p class="footer-meta">© <span id="year"></span> art20217 · <a href="https://github.com/art20217" target="_blank" rel="noopener">GitHub</a></p>
    </div>
  </footer>

  <script src="tools.js"></script>
  <script src="app.js"></script>
</body>
</html>
